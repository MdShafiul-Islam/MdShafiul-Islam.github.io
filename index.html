<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Md Shafiul Islam</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      color: #222;
    }
    .container {
      max-width: 700px;
      margin: 60px auto;
      padding: 20px;
    }
    .profile-img {
      width: 220px;
      height: 280px;
      object-fit: cover;
      border-radius: 30px;
      display: block;
      margin-bottom: 30px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }
    p {
      font-size: 22px;
      line-height: 1.7;
      margin-bottom: 24px;
    }
    .buttons a {
      display: inline-block;
      margin-right: 12px;
      margin-top: 12px;
      padding: 12px 22px;
      background: #ddd;
      color: #222;
      text-decoration: none;
      border-radius: 12px;
      font-size: 18px;
    }
    .buttons a:hover {
      background: #cfcfcf;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="profile.jpg" alt="Profile Photo" class="profile-img">

    <h1>Md Shafiul Islam</h1>

    <p>Welcome!</p>

    <p>
      I am a Ph.D. student in Economics at the University of Oklahoma.
      My research interests include development economics, energy economics,
      and industrial organization.
    </p>

    <p>
      This website will include my research, teaching, and CV.
    </p>

    <div class="buttons">
      <a href="#">Teaching</a>
      <a href="#">Research</a>
      <a href="#">CV</a>
    </div>
  </div>
</body>
</html>
